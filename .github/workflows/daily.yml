name: Daily AI Projects

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install openai

      - name: Generate AI Project
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          FOLDER=project-$(date +%s)
          mkdir $FOLDER

          cat <<EOF > generate.py
from openai import OpenAI
import os

client = OpenAI(
  base_url="https://integrate.api.nvidia.com/v1",
  api_key=os.environ["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"]
)

prompt = """
Create a small real project:
- HTML + CSS + JavaScript
- useful idea
- clean code
- include README content
"""

completion = client.chat.completions.create(
  model="deepseek-ai/deepseek-v4-pro",
  messages=[{"role":"user","content":prompt}],
  temperature=0.7,
  max_tokens=2000
)

content = completion.choices[0].message.content

# write files
with open(f"{os.environ.get('FOLDER','project')}/index.html", "w") as f:
    f.write(content)

with open(f"{os.environ.get('FOLDER','project')}/README.md", "w") as f:
    f.write("# AI Project\\nGenerated automatically")
EOF

          export FOLDER=$FOLDER
          python generate.py

      - name: Commit & Force Push
        run: |
          git config user.name "adam-bot"
          git config user.email "bot@example.com"

          git add .
          git commit -m "AI project $(date)" || echo "no changes"

          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
